<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#334155;--border:#334155;--text:#f1f5f9;--text2:#94a3b8;--text3:#64748b;--red:#ef4444;--blue:#3b82f6;--purple:#a855f7;--green:#22c55e;--emerald:#10b981;--yellow:#eab308;--orange:#f97316;--accent:#3b82f6}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.m{font-family:'JetBrains Mono',monospace}
.container{max-width:640px;margin:0 auto;padding:12px 16px 80px}
.header{display:flex;align-items:baseline;gap:8px;margin-bottom:4px}
.header h1{font-size:18px;font-weight:700;letter-spacing:-0.5px}
.header h1 .a{color:var(--accent)}.header h1 .b{color:var(--text3)}
.badge{font-size:10px;padding:2px 6px;border-radius:4px;background:rgba(34,197,94,0.15);color:var(--green);font-weight:600}
.sub{font-size:11px;color:var(--text3);margin-bottom:16px}
.tabs{display:flex;gap:4px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;-webkit-overflow-scrolling:touch}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:8px 14px;border-radius:8px;font-size:12px;font-weight:600;white-space:nowrap;cursor:pointer;border:none;background:var(--bg2);color:var(--text3);transition:all .2s}
.tab:hover{background:var(--bg3);color:var(--text2)}.tab.on{background:var(--accent);color:#fff}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:12px}
.card.w{background:rgba(234,179,8,0.06);border-color:rgba(234,179,8,0.2)}
.card.g{background:rgba(34,197,94,0.06);border-color:rgba(34,197,94,0.2)}
.ct{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text2);margin-bottom:12px}
.day{background:rgba(15,23,42,0.5);border:1px solid var(--border);border-radius:12px;padding:12px;margin-bottom:8px}
.dh{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dn{font-size:13px;font-weight:700}
.dnote{font-size:10px;color:var(--text3);font-style:italic}
.sess{display:flex;gap:8px;align-items:flex-start;margin-bottom:6px}
.sess:last-child{margin-bottom:0}
.st{font-size:10px;padding:2px 8px;border-radius:5px;font-weight:600;white-space:nowrap;flex-shrink:0}
.tr{background:rgba(239,68,68,0.15);color:var(--red)}
.ts{background:rgba(168,85,247,0.15);color:var(--purple)}
.ty{background:rgba(34,197,94,0.15);color:var(--green)}
.tw{background:rgba(16,185,129,0.15);color:var(--emerald)}
.te{background:rgba(59,130,246,0.15);color:var(--blue)}
.tc{background:rgba(99,102,241,0.15);color:#818cf8}
.sb{flex:1;min-width:0}
.sd{font-size:12px;color:var(--text)}
.sp{display:flex;flex-wrap:wrap;gap:8px;margin-top:2px}
.sp span{font-size:11px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
@media(min-width:480px){.stats{grid-template-columns:repeat(4,1fr)}}
.sl{font-size:10px;text-transform:uppercase;letter-spacing:0.8px;color:var(--text3)}
.sv{font-size:18px;font-weight:700;color:var(--text);margin-top:2px}
.ss{font-size:10px;color:var(--text3);margin-top:1px}
.zb{display:flex;border-radius:4px;overflow:hidden;height:10px}
.zl{display:flex;gap:10px;margin-top:6px}
.zl span{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text3)}
.zd{width:8px;height:8px;border-radius:2px;flex-shrink:0;display:inline-block}
.cw{position:relative;height:200px;margin:8px 0}
.pr{margin-bottom:14px}.prh{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:4px}
.prl{font-size:12px;color:var(--text2);font-family:'JetBrains Mono',monospace}
.prv{font-size:13px;font-weight:700;color:var(--text)}
.prb{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden}
.prf{height:100%;border-radius:4px;background:linear-gradient(90deg,rgba(239,68,68,0.6),var(--red))}
.ms{display:flex;gap:8px;align-items:flex-start;margin-bottom:10px}
.mi{font-size:12px;margin-top:2px;flex-shrink:0}
.mt{font-size:13px;font-weight:500;color:var(--text)}
.msub{font-size:11px;color:var(--text3)}
.pc{background:rgba(15,23,42,0.4);border-radius:8px;padding:8px 10px;margin-bottom:6px}
.pcr{display:flex;justify-content:space-between;align-items:baseline}
.tbl{width:100%;font-size:11px;border-collapse:collapse}
.tbl th{text-align:left;padding:6px 8px;color:var(--text3);text-transform:uppercase;font-size:10px;letter-spacing:0.5px}
.tbl td{padding:6px 8px;border-top:1px solid rgba(51,65,85,0.4)}
.tbl .r{text-align:right}
.ctx{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
.hi{background:rgba(59,130,246,0.08);border:1px solid rgba(59,130,246,0.15);border-radius:8px;padding:10px;font-size:11px;color:rgba(147,197,253,0.9);margin-top:8px}
.phase-desc{font-size:12px;color:var(--text2);line-height:1.6;padding:10px;background:rgba(15,23,42,0.4);border-radius:8px;margin-bottom:12px}
footer{text-align:center;font-size:10px;color:var(--text3);margin-top:24px;padding-bottom:20px}
.chk{width:26px;height:26px;border-radius:50%;border:2px solid var(--bg3);display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:all .2s;margin-top:1px;-webkit-tap-highlight-color:transparent}
.chk:hover{border-color:var(--text3)}
.chk.done{border-color:var(--green);background:var(--green)}
.chk.done::after{content:'\2713';color:#fff;font-size:12px;font-weight:700}
.refresh-btn{background:none;border:1px solid var(--bg3);border-radius:6px;color:var(--text3);font-size:11px;padding:4px 10px;cursor:pointer;display:flex;align-items:center;gap:4px;transition:all .2s;font-family:'DM Sans',sans-serif}
.refresh-btn:hover{border-color:var(--text2);color:var(--text2)}
.refresh-btn svg{width:12px;height:12px}
.header-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:4px}
.day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 0 20px rgba(59,130,246,0.1)}
.day-date{font-size:11px;color:var(--text3);font-family:'JetBrains Mono',monospace;margin-left:6px;font-weight:400}
.day-count{font-size:10px;color:var(--text3);font-family:'JetBrains Mono',monospace;background:var(--bg3);padding:1px 6px;border-radius:10px}
.day-count.alldone{background:rgba(34,197,94,0.2);color:var(--green)}
.week-dots{display:flex;gap:6px;align-items:center;justify-content:center;margin-bottom:16px;padding:10px;background:var(--bg2);border-radius:10px;border:1px solid var(--border)}
.week-dot{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.week-dot-circle{width:22px;height:22px;border-radius:50%;border:2px solid var(--bg3);display:flex;align-items:center;justify-content:center;font-size:9px;transition:all .3s}
.week-dot-circle.partial{border-color:var(--accent);background:rgba(59,130,246,0.15)}
.week-dot-circle.complete{border-color:var(--green);background:var(--green);color:#fff;font-weight:700}
.week-dot-circle.is-today{box-shadow:0 0 0 2px var(--bg),0 0 0 4px var(--accent)}
.week-dot-label{font-size:9px;color:var(--text3);font-family:'JetBrains Mono',monospace}
.rv{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.rv-icon{font-size:14px;flex-shrink:0}
.rv-text{font-size:12px;color:var(--text2)}
.rv-val{font-size:12px;font-weight:600}
.rv-good{color:var(--green)}.rv-ok{color:var(--yellow)}.rv-miss{color:var(--red)}
</style>
</head>
<body>
<div class="container" id="app"></div>
<script>
// ═══════════════════════════════════════
// DATA — Updated 2026-03-22 with LTHR 169
// ═══════════════════════════════════════
var B={lthr:169,maxHr:184,restHr:42,vo2max:50.3,vdot:35,best5k:"26:26",ltPace:"5:17",
garminStatus:"Productive",garminFeedback:"Aerobic High Shortage",
hrvStatus:"Balanced",hrvAvg:67,
racePred:{k5:"23:31",k10:"50:50",half:"1:55:05"},
zones:[{n:"Z1 Recovery",lo:0,hi:144,c:"#94a3b8"},{n:"Z2 Aerobic",lo:144,hi:150,c:"#60a5fa"},{n:"Z3 Tempo",lo:152,hi:159,c:"#34d399"},{n:"Z4 Sub-Threshold",lo:161,hi:167,c:"#fbbf24"},{n:"Z5a Supra",lo:169,hi:172,c:"#f97316"},{n:"Z5b VO2max",lo:174,hi:179,c:"#ef4444"},{n:"Z5c Anaerobic",lo:179,hi:220,c:"#dc2626"}],
paces:{E:"6:00\u20136:15",T:"5:10\u20135:20",I:"4:45\u20134:55",R:"~4:20"}};

// All runs including this week's new ones
var RUNS=[
{d:"Jan 20",km:5.51,min:27.6,hr:158,p:"5:00",z:[2,2,11,78,6],lb:"Tempo"},
{d:"Jan 30",km:5.49,min:27.5,hr:163,p:"5:01",z:[1,2,5,78,14],lb:"LT"},
{d:"Feb 3",km:7.34,min:36.9,hr:162,p:"5:03",z:[1,2,12,63,22],lb:"LT"},
{d:"Feb 11",km:5.58,min:27.6,hr:166,p:"4:57",z:[1,2,7,56,34],lb:"LT"},
{d:"Feb 21",km:7.52,min:41,hr:162,p:"5:27",z:[0,2,9,84,5],lb:"LT"},
{d:"Feb 24",km:7.39,min:38.4,hr:165,p:"5:11",z:[1,2,5,73,19],lb:"LT"},
{d:"Mar 1",km:5.01,min:26.6,hr:156,p:"5:19",z:[1,2,17,79,0],lb:"Tempo"},
{d:"Mar 16",km:7.84,min:47.5,hr:137,p:"6:03",z:[4,18,77,1,0],lb:"Easy",easy:true},
{d:"Mar 18",km:6.96,min:37.6,hr:159,p:"5:24",z:[1,5,8,77,9],lb:"Threshold"}];

var WK=[
{w:"Jan 19",rKm:5.5,sKm:18.5,str:5,rN:1},{w:"Jan 26",rKm:5.5,sKm:9.8,str:6,rN:1},
{w:"Feb 2",rKm:7.3,sKm:23.7,str:9,rN:1},{w:"Feb 9",rKm:5.6,sKm:0,str:8,rN:1},
{w:"Feb 16",rKm:7.5,sKm:15.8,str:5,rN:1},{w:"Feb 23",rKm:12.4,sKm:25.4,str:4,rN:2},
{w:"Mar 2",rKm:5,sKm:35.2,str:1,rN:1},{w:"Mar 9",rKm:0,sKm:84.7,str:0,rN:0},
{w:"Mar 16",rKm:14.8,sKm:0,cKm:70.4,str:5,rN:2}];

var ZC=["#94a3b8","#60a5fa","#10b981","#f59e0b","#f97316","#ef4444","#dc2626"];
var TABS=["This Week","Last Week","Progress","Plan","Profile","Methods"];
var activeTab=0;
var currentWeek=2;
var currentPhase=1;

// Week 2 dates
var DAYS=[
  {key:'mon',name:'Monday',date:'Mar 23',color:'var(--blue)',note:'Arms + running = zero interference',
   ids:['mon-yoga','mon-arms','mon-walk','mon-run']},
  {key:'tue',name:'Tuesday',date:'Mar 24',color:'var(--purple)',note:'',
   ids:['tue-yoga','tue-core','tue-walk','tue-chest']},
  {key:'wed',name:'Wednesday',date:'Mar 25',color:'var(--red)',note:'Key quality session',
   ids:['wed-yoga','wed-run']},
  {key:'thu',name:'Thursday',date:'Mar 26',color:'var(--purple)',note:'No running \u2014 recovery from Wed threshold',
   ids:['thu-yoga','thu-arms','thu-walk','thu-core']},
  {key:'fri',name:'Friday',date:'Mar 27',color:'var(--yellow)',note:'No running. 48hrs before next hard effort.',
   ids:['fri-yoga','fri-legs','fri-lchest']},
  {key:'sat',name:'Saturday',date:'Mar 28',color:'var(--blue)',note:'Aerobic base \u2014 Z1\u2013Z2 only',
   ids:['sat-yoga','sat-endurance']},
  {key:'sun',name:'Sunday',date:'Mar 29',color:'var(--green)',note:'Active recovery, not a workout',
   ids:['sun-yoga','sun-outdoor']}
];

// Checkmark persistence
var checkKey='checks-w'+currentWeek;
function getChecks(){try{return JSON.parse(localStorage.getItem(checkKey))||{};}catch(e){return {};}}
function toggleCheck(id){var c=getChecks();if(c[id])delete c[id];else c[id]=1;localStorage.setItem(checkKey,JSON.stringify(c));render();}
function isChecked(id){return !!getChecks()[id];}
function chk(id){return '<div class="chk'+(isChecked(id)?' done':'')+'" onclick="toggleCheck(\''+id+'\')"></div>';}
function getDayCheckedCount(dayIdx){var d=DAYS[dayIdx];var c=getChecks();var n=0;for(var i=0;i<d.ids.length;i++){if(c[d.ids[i]])n++;}return n;}
function getTodayIdx(){var dow=new Date().getDay();if(dow===0)return 6;return dow-1;}

function weekDots(){
  var checks=getChecks();var todayIdx=getTodayIdx();
  var h='<div class="week-dots">';var sn=['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
  for(var i=0;i<7;i++){var d=DAYS[i];var done=getDayCheckedCount(i);var total=d.ids.length;
    var cls='week-dot-circle';if(done>=total&&total>0)cls+=' complete';else if(done>0)cls+=' partial';if(i===todayIdx)cls+=' is-today';
    h+='<div class="week-dot"><div class="'+cls+'">'+(done>=total&&total>0?'\u2713':(done>0?done:''))+'</div><span class="week-dot-label">'+sn[i]+'</span></div>';}
  return h+'</div>';
}

function sess(id,tag,label,desc,params){
  var h='<div class="sess">'+chk(id)+'<span class="st '+tag+'">'+label+'</span><div class="sb"><span class="sd">'+desc+'</span>';
  if(params){h+='<div class="sp">';for(var i=0;i<params.length;i++)h+='<span>'+params[i]+'</span>';h+='</div>';}
  return h+'</div></div>';
}

function dayOpen(idx){
  var d=DAYS[idx];var todayIdx=getTodayIdx();var isToday=idx===todayIdx;
  var done=getDayCheckedCount(idx);var total=d.ids.length;
  var countCls='day-count'+(done>=total&&total>0?' alldone':'');
  var h='<div class="day'+(isToday?' today':'')+'">';
  h+='<div class="dh"><div style="display:flex;align-items:baseline"><span class="dn" style="color:'+d.color+'">'+d.name+'</span><span class="day-date">'+d.date+'</span></div>';
  h+='<div style="display:flex;align-items:center;gap:6px">';
  if(done>0)h+='<span class="'+countCls+'">'+done+'/'+total+'</span>';
  if(d.note)h+='<span class="dnote">'+d.note+'</span>';
  h+='</div></div>';return h;
}

function zb(z){if(!z)return'';var h='<div class="zb">';for(var i=0;i<z.length;i++){if(z[i]>0)h+='<div style="width:'+z[i]+'%;background:'+ZC[i]+'"></div>';}return h+'</div>';}
function zl(){var n=["Z1","Z2","Z3","Z4","Z5"];var h='<div class="zl">';for(var i=0;i<5;i++)h+='<span><span class="zd" style="background:'+ZC[i]+'"></span>'+n[i]+'</span>';return h+'</div>';}

// ═══════════ THIS WEEK (Week 2) ═══════════
function renderThisWeek(){
  var h=weekDots();
  h+='<div class="card"><div class="ct">Week '+currentWeek+' \u2014 Phase '+currentPhase+'</div>';
  h+='<div style="display:flex;gap:16px;margin-bottom:4px;font-size:12px"><span style="color:var(--red)" class="m">2 runs \u00b7 ~87min</span><span style="color:var(--green)" class="m">57% easy</span></div>';
  h+='<p class="ctx">Week 2 continues Phase 1. Easy run extended 5min (45\u219250min per Daniels 10% rule). Threshold block unchanged. LTHR updated to 169 \u2014 all HR targets adjusted. Easy ceiling now &lt;144 bpm (was &lt;148).</p>';

  h+=dayOpen(0);
  h+=sess('mon-yoga','ty','Yoga','Morning stretch');
  h+=sess('mon-arms','ts','Arms','Curls, triceps, etc.',['40 min']);
  h+=sess('mon-walk','tw','Lunch Walk','Easy pace around town',['30 min','Z1','&lt;120 bpm']);
  h+=sess('mon-run','tr','Easy Run','Flat route, conversational pace. Extended 5min from last week.',['50 min','~8 km','6:00\u20136:15/km','HR &lt;144 bpm']);
  h+='</div>';

  h+=dayOpen(1);
  h+=sess('tue-yoga','ty','Yoga','Morning stretch');
  h+=sess('tue-core','tc','Core','Sit-ups, planks, trunk',['30 min']);
  h+=sess('tue-walk','tw','Lunch Walk','Recovery walk',['30 min']);
  h+=sess('tue-chest','ts','Upper Chest','Bench press, flyes',['40 min']);
  h+='</div>';

  h+=dayOpen(2);
  h+=sess('wed-yoga','ty','Yoga','Morning stretch');
  h+=sess('wed-run','tr','Threshold Run','1.5km warmup \u2192 20min @ threshold \u2192 1.5km cooldown',['~6.5 km','5:10\u20135:20/km','HR 161\u2013167','~37 min']);
  h+='</div>';

  h+=dayOpen(3);
  h+=sess('thu-yoga','ty','Yoga','Morning stretch');
  h+=sess('thu-arms','ts','Arms','Curls, triceps, etc.',['40 min']);
  h+=sess('thu-walk','tw','Lunch Walk','Aids recovery',['30 min']);
  h+=sess('thu-core','tc','Core','Sit-ups, planks',['30 min']);
  h+='</div>';

  h+=dayOpen(4);
  h+=sess('fri-yoga','ty','Yoga','Morning stretch');
  h+=sess('fri-legs','ts','Legs','Deadlift, squats \u2014 heaviest session',['40\u201350 min']);
  h+=sess('fri-lchest','ts','Lower Chest','Incline/decline work',['30 min']);
  h+='</div>';

  h+=dayOpen(5);
  h+=sess('sat-yoga','ty','Yoga','Morning stretch');
  h+=sess('sat-endurance','te','Long Endurance','Snowshoe, cycle, hike, or ski \u2014 your choice',['2\u20135 hrs','Z1\u2013Z2','HR &lt;150','easy if legs sore from Fri']);
  h+='</div>';

  h+=dayOpen(6);
  h+=sess('sun-yoga','ty','Yoga','Morning stretch');
  h+=sess('sun-outdoor','te','Light Outdoor','Easy snowshoe, hike, or walk. Fresh air &amp; movement.',['45\u201390 min','Z1 only','HR &lt;140']);
  h+='</div>';
  h+='</div>';

  h+='<div class="card w"><div class="ct">Override Rules</div><div style="font-size:12px;color:var(--text2)">';
  h+='<p style="margin-bottom:4px">\u2022 Garmin Readiness &lt;30 for 2+ days \u2192 skip threshold, do easy or rest</p>';
  h+='<p style="margin-bottom:4px">\u2022 Easy run HR consistently above 144 \u2192 slow down, don\'t chase the pace</p>';
  h+='<p style="margin-bottom:4px">\u2022 Legs very sore from Friday \u2192 Saturday Z1 only or swap to upper body</p>';
  h+='<p style="margin-bottom:4px">\u2022 Missed a full week \u2192 restart previous phase, not current</p>';
  h+='<p>\u2022 Cold below \u221215\u00b0C or icy \u2192 HR only, ignore all pace targets</p>';
  h+='</div></div>';

  h+='<div class="card"><div class="ct">Current Garmin Status (Mar 22)</div><div class="stats">';
  h+='<div><div class="sl">Training Status</div><div class="sv" style="font-size:14px;color:var(--green)">Productive</div></div>';
  h+='<div><div class="sl">Garmin Feedback</div><div class="sv" style="font-size:14px;color:var(--orange)">Aerobic High Shortage</div></div>';
  h+='<div><div class="sl">VO2max</div><div class="sv">50.3</div></div>';
  h+='<div><div class="sl">Resting HR</div><div class="sv">42</div><div class="ss">Down from 44</div></div>';
  h+='<div><div class="sl">HRV</div><div class="sv">67</div><div class="ss">Balanced</div></div>';
  h+='<div><div class="sl">Readiness</div><div class="sv">74</div><div class="ss">Morning score</div></div>';
  h+='<div><div class="sl">LTHR</div><div class="sv" style="color:var(--yellow)">169</div><div class="ss">Updated from 174</div></div>';
  h+='<div><div class="sl">Race Pred 5K</div><div class="sv">23:31</div><div class="ss">Garmin estimate</div></div>';
  h+='</div></div>';
  return h;
}

// ═══════════ LAST WEEK REVIEW ═══════════

// ═══════════ METHODS ═══════════
function renderMethods(){
  var secs=[
    {t:"Sources &amp; Framework",c:"This plan draws from multiple evidence-based systems:\n\n\u2022 Seiler polarized model \u2014 intensity distribution in endurance athletes (Seiler 2010; St\u00f6ggl &amp; Sperlich 2014). 70\u201380% of endurance training time below first lactate threshold, measured by time.\n\n\u2022 Daniels Running Formula (4th ed.) \u2014 VDOT and performance-based training pace categories. Paces derived from race performance, not simple %VO2max. Volume increase capped at ~10% per week.\n\n\u2022 Friel HR zones \u2014 7-zone system anchored to running LTHR (Training Bible). Zones are running-specific; other sports have different thresholds. Currently using LTHR 169 (Garmin auto-detect Mar 16, updated from 174).\n\n\u2022 Concurrent training \u2014 Hickson 1980; Wilson et al. 2012 meta-analysis; Schumann et al. 2014. Upper body strength has near-zero interference with running. Lower body: 48+ hours from hard running."},
    {t:"How Easy Pace Was Calculated",c:"VDOT tables (Daniels) prescribe ~7:00/km for VDOT 35. This was corrected upward.\n\nReason: VO2max 50 reflects total cardiovascular fitness, VDOT 35 reflects running-specific performance. The 10+ point gap means the aerobic system supports faster easy running than tables suggest.\n\nWeek 1 confirmed: Easy run at 6:03/km produced avg HR 137. With updated LTHR 169, Z1 ceiling = 144 bpm (85% of 169). HR 137 is solidly Z1.\n\nRule: HR governs pace. Run at whatever keeps HR below 144. In Troms\u00f8 winter conditions, this may be 6:15\u20136:30/km."},
    {t:"How Training Load Is Tracked",c:"Previous versions used unified hrTSS across all sports. This was incorrect.\n\nCorrected approach:\n\u2022 Running: weekly distance (km) + time distribution (easy vs threshold)\n\u2022 Strength: session count and consistency (not HR-based)\n\u2022 Long endurance: duration + average HR zone\n\u2022 Walks/yoga: not tracked as training load\n\nFatigue decisions use Garmin Training Readiness + sleep quality + HRV status as primary signals, not calendar-based recovery cycles."},
    {t:"Concurrent Training Scheduling",c:"From Hickson (1980), Wilson et al. (2012), Schumann et al. (2014):\n\n\u2022 Arms, chest, core \u2192 zero interference with running. No scheduling constraint.\n\u2022 Legs (deadlift, squat) \u2192 48hrs from hard running.\n\nSchedule: Fri legs \u2192 Sat easy endurance \u2192 Sun light/easy run \u2192 Mon easy run = 72hrs between legs and next significant running load.\n\nAt current running volume (~2\u20133\u00d7/week, 13\u201324km), the AMPK-mTOR interference pathway is not a concern."},
    {t:"Weekly Update Process",c:"Each week: say \"update\". Then:\n\n1. Pull all Garmin data (activities, LTHR, VO2max, training status, readiness, HRV, resting HR, race predictions) + Strava cross-reference\n2. Process: filter to current week, extract stats per activity, check for baseline changes (LTHR, VO2max), recalculate zones if needed\n3. Compare actual vs planned day-by-day, deep dive on running + endurance\n4. Generate next week plan: apply Daniels 10% volume rule, check phase transitions, apply override rules\n5. Update app: new week plan, Last Week review, Progress data, any baseline changes\n6. Push to GitHub \u2192 site updates automatically\n\nThe plan is a guide, not a contract. If sessions are missed, fatigue is high, or life intervenes, the prescription adjusts."},
  ];
  var h='';for(var i=0;i<secs.length;i++){h+='<div class="card"><div class="ct">'+secs[i].t+'</div><div style="font-size:12px;color:var(--text2);line-height:1.7;white-space:pre-wrap">'+secs[i].c+'</div></div>';}
  return h;
}

// ═══════════ RENDER ═══════════
function render(){
  var a=document.getElementById("app");
  var checks=getChecks();var totalSessions=0;for(var di=0;di<DAYS.length;di++)totalSessions+=DAYS[di].ids.length;var doneCount=0;for(var k in checks)if(checks[k])doneCount++;
  var h='<div class="header-row"><div class="header"><h1><span class="a">ENDURANCE</span><span class="b"> COACH</span></h1><span class="badge">by VERTERYN</span></div>';
  h+='<button class="refresh-btn" onclick="location.reload(true)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M1 4v6h6M23 20v-6h-6"/><path d="M20.49 9A9 9 0 0 0 5.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 0 1 3.51 15"/></svg>Refresh</button></div>';
  h+='<div class="sub m">Troms\u00f8 \u00b7 LTHR '+B.lthr+' \u00b7 VDOT ~'+B.vdot+' \u00b7 VO2max '+B.vo2max+' \u00b7 Updated 2026-03-22'+(doneCount>0?' \u00b7 <span style="color:var(--green)">'+doneCount+'/'+totalSessions+' done</span>':'')+'</div>';
  h+='<div class="tabs" id="tabs">';
  for(var i=0;i<TABS.length;i++)h+='<button class="tab'+(activeTab===i?' on':'')+'" data-i="'+i+'">'+TABS[i]+'</button>';
  h+='</div><div id="content">';
  if(activeTab===0)h+=renderThisWeek();
  else if(activeTab===1)h+=renderLastWeek();
  else if(activeTab===2)h+=renderProgress();
  else if(activeTab===3)h+=renderPlan();
  else if(activeTab===4)h+=renderProfile();
  else if(activeTab===5)h+=renderMethods();
  h+='</div><footer>Seiler polarized + Daniels VDOT + Friel zones + concurrent training research</footer>';
  a.innerHTML=h;
  var btns=document.querySelectorAll('.tab');
  for(var i=0;i<btns.length;i++){btns[i].addEventListener('click',function(){activeTab=parseInt(this.getAttribute('data-i'));render();window.scrollTo(0,0);});}
  if(activeTab===2)initCharts();
}

function initCharts(){
  var ctx=document.getElementById('volChart');if(!ctx)return;
  new Chart(ctx,{type:'bar',data:{labels:WK.map(function(w){return w.w}),datasets:[
    {label:'Run km',data:WK.map(function(w){return w.rKm}),backgroundColor:'rgba(239,68,68,0.8)',borderRadius:4,barPercentage:0.7},
    {label:'Endurance km',data:WK.map(function(w){return w.sKm||(w.cKm||0)}),backgroundColor:'rgba(59,130,246,0.45)',borderRadius:4,barPercentage:0.7}
  ]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#94a3b8',font:{size:11,family:'DM Sans'},padding:16}},tooltip:{backgroundColor:'#1e293b',titleColor:'#f1f5f9',bodyColor:'#94a3b8',borderColor:'#334155',borderWidth:1,cornerRadius:8,padding:10}},scales:{x:{ticks:{color:'#64748b',font:{size:10,family:'DM Sans'}},grid:{display:false}},y:{ticks:{color:'#64748b',font:{size:10},callback:function(v){return v+'km'}},grid:{color:'rgba(51,65,85,0.3)'}}}}});
}
render();
</script>
